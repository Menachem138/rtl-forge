<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="How RTL Forge works: verify the signed app, open a debug channel, inject the layout-only payload, RTL goes live">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070C1A"/><stop offset="100%" stop-color="#0E1230"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="38%" stop-color="#10A37F"/>
      <stop offset="70%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#10A37F"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <style>
      text{font-family:'Inter','SF Pro Display',-apple-system,'Segoe UI',sans-serif}
      .t{fill:#E7ECF5;font-weight:600}
      .d{fill:#93A0B8;font-weight:400}
      .n{fill:#0B0F1F;font-weight:800}
      .h{fill:#F2F5FB;font-weight:700}
      .cap{fill:#64748B;font-weight:500}
    </style>
  </defs>

  <rect width="1200" height="560" rx="24" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="24" fill="none" stroke="#1C2646"/>

  <!-- header -->
  <g transform="translate(64,58)">
    <g stroke="url(#accent)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="20,4 8,18 20,32"/><polyline points="34,4 22,18 34,32"/><polyline points="48,4 36,18 48,32"/>
    </g>
    <text x="72" y="20" class="h" font-size="27">How RTL Forge works</text>
    <text x="72" y="46" class="cap" font-size="16">Runtime injection into the official signed app — no copy, no asar edit, no re-sign.</text>
  </g>

  <!-- steps -->
  <g transform="translate(40,150)">
    <!-- connectors -->
    <g stroke="#2B3A5E" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round">
      <line x1="270" y1="150" x2="300" y2="150"/><line x1="550" y1="150" x2="580" y2="150"/><line x1="830" y1="150" x2="860" y2="150"/>
    </g>

    <!-- card 1 -->
    <g transform="translate(0,0)">
      <rect width="270" height="300" rx="18" fill="#121A30" stroke="#26324F"/>
      <circle cx="44" cy="52" r="21" fill="url(#s1)"/><text x="44" y="60" text-anchor="middle" class="n" font-size="24">1</text>
      <g transform="translate(105,34)" fill="none" stroke="url(#s1)" stroke-width="4" stroke-linejoin="round">
        <path d="M18 2 L34 9 V22 C34 34 27 41 18 45 C9 41 2 34 2 22 V9 Z"/>
        <polyline points="11,23 16,29 26,17" stroke-linecap="round"/>
      </g>
      <text x="30" y="130" class="t" font-size="21">Verify the app</text>
      <text x="30" y="164" class="d" font-size="15.5">Confirms the official</text>
      <text x="30" y="187" class="d" font-size="15.5">signed app — Claude,</text>
      <text x="30" y="210" class="d" font-size="15.5">Codex, or Hermes.</text>
      <text x="30" y="256" class="cap" font-size="13.5">Team ID checked first</text>
    </g>

    <!-- card 2 -->
    <g transform="translate(300,0)">
      <rect width="270" height="300" rx="18" fill="#121A30" stroke="#26324F"/>
      <circle cx="44" cy="52" r="21" fill="url(#s2)"/><text x="44" y="60" text-anchor="middle" class="n" font-size="24">2</text>
      <g transform="translate(103,36)" fill="none" stroke="url(#s2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 22 L14 14 M4 12 L16 24"/><rect x="14" y="6" width="18" height="18" rx="5"/><path d="M24 24 L34 34"/>
      </g>
      <text x="30" y="130" class="t" font-size="21">Open a channel</text>
      <text x="30" y="164" class="d" font-size="15.5">Claude's own debugger</text>
      <text x="30" y="187" class="d" font-size="15.5">or a local Chromium</text>
      <text x="30" y="210" class="d" font-size="15.5">CDP port (127.0.0.1).</text>
      <text x="30" y="256" class="cap" font-size="13.5">Nothing on disk changes</text>
    </g>

    <!-- card 3 -->
    <g transform="translate(580,0)">
      <rect width="270" height="300" rx="18" fill="#121A30" stroke="#26324F"/>
      <circle cx="44" cy="52" r="21" fill="url(#s3)"/><text x="44" y="60" text-anchor="middle" class="n" font-size="24">3</text>
      <g transform="translate(104,34)" fill="none" stroke="url(#s3)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 4 V30 M9 21 L18 30 L27 21"/><path d="M4 40 H32"/>
      </g>
      <text x="30" y="130" class="t" font-size="21">Inject the payload</text>
      <text x="30" y="164" class="d" font-size="15.5">A layout-only RTL</text>
      <text x="30" y="187" class="d" font-size="15.5">payload runs in the</text>
      <text x="30" y="210" class="d" font-size="15.5">renderer. Zero network.</text>
      <text x="30" y="256" class="cap" font-size="13.5">Re-runs on navigation</text>
    </g>

    <!-- card 4 -->
    <g transform="translate(860,0)">
      <rect width="270" height="300" rx="18" fill="#121A30" stroke="#26324F"/>
      <circle cx="44" cy="52" r="21" fill="url(#s4)"/><text x="44" y="60" text-anchor="middle" class="n" font-size="24">4</text>
      <g transform="translate(103,32)" fill="none" stroke="url(#s4)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M34 10 H8 M18 10 V40 M12 40 H24"/><polyline points="14,26 4,26" /><polyline points="8,21 3,26 8,31"/>
      </g>
      <text x="30" y="130" class="t" font-size="21">RTL goes live</text>
      <text x="30" y="164" class="d" font-size="15.5">Hebrew and Arabic flip</text>
      <text x="30" y="187" class="d" font-size="15.5">RTL; English stays LTR;</text>
      <text x="30" y="210" class="d" font-size="15.5">code and terminal safe.</text>
      <text x="30" y="256" class="cap" font-size="13.5">Per-block, content-derived</text>
    </g>
  </g>

  <!-- safety footer -->
  <g transform="translate(0,506)">
    <line x1="64" y1="0" x2="1136" y2="0" stroke="#1C2646"/>
    <text x="600" y="32" text-anchor="middle" class="cap" font-size="15">✓ no copy   ✓ no asar edit   ✓ no re-sign   ✓ keeps subscription · Cowork · Claude Code   ✓ zero telemetry</text>
  </g>
</svg>
