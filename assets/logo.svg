<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="RTL Forge logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060B18"/>
      <stop offset="100%" stop-color="#0F1028"/>
    </linearGradient>
    <linearGradient id="forge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#10A37F"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Central RTL arrow motif -->
  <g transform="translate(256,230)" filter="url(#glow)">
    <path d="M-80 0 H80" stroke="url(#forge)" stroke-width="14" stroke-linecap="round"/>
    <path d="M-80 0 L-40 -36" stroke="url(#forge)" stroke-width="14" stroke-linecap="round"/>
    <path d="M-80 0 L-40 36" stroke="url(#forge)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <text x="256" y="370" text-anchor="middle" fill="#E2E8F0" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="64" font-weight="800" letter-spacing="-1">RTL</text>
  <text x="256" y="420" text-anchor="middle" fill="#64748B" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="20" font-weight="600" letter-spacing="6">FORGE</text>
</svg>
