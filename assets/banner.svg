<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Desktop RTL Runtime banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#121A2F"/>
      <stop offset="100%" stop-color="#1A1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F8CFF"/>
      <stop offset="100%" stop-color="#8B7CFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1040" cy="140" r="180" fill="#4F8CFF" opacity="0.08"/>
  <circle cx="220" cy="520" r="220" fill="#8B7CFF" opacity="0.08"/>

  <!-- RTL arrow motif -->
  <g transform="translate(860,210)" filter="url(#glow)">
    <path d="M40 80 H260" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M40 80 L90 40" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M40 80 L90 120" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <rect x="120" y="20" width="180" height="50" rx="14" fill="#1C2540" stroke="#4F8CFF" stroke-opacity="0.5"/>
    <rect x="150" y="90" width="220" height="50" rx="14" fill="#1C2540" stroke="#8B7CFF" stroke-opacity="0.5"/>
    <text x="285" y="52" text-anchor="end" fill="#E8EEFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">שלום · مرحبا</text>
    <text x="350" y="122" text-anchor="end" fill="#B8C4E6" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Claude · Codex</text>
  </g>

  <text x="80" y="250" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="64" font-weight="700">Desktop RTL Runtime</text>
  <text x="80" y="320" fill="#B8C4E6" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28">Official apps · No copy · No re-sign</text>
  <text x="80" y="380" fill="#8FA0C8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Hebrew · Arabic · Persian for Claude Desktop &amp; Codex</text>

  <rect x="80" y="430" width="210" height="44" rx="22" fill="url(#accent)"/>
  <text x="185" y="458" text-anchor="middle" fill="#0B1220" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">macOS runtime</text>
  <rect x="310" y="430" width="180" height="44" rx="22" fill="#1C2540" stroke="#4F8CFF"/>
  <text x="400" y="458" text-anchor="middle" fill="#E8EEFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">MIT © Menachem</text>
</svg>
